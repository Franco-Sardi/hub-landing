<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- Título & descripción — paleta lingüística del brochure 2026 -->
    <title>HUB — Red de Infraestructura y Servicios · Mendoza</title>

    <!-- Favicons — paleta oficial (Pantone 303 C navy + Pantone 877 C silver) -->

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#022A3A" />

    <!-- Open Graph / Twitter share -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="HUB — Red de Infraestructura y Servicios" />

    <!-- Tipografías oficiales del manual de marca HUB 2026.
         · Roboto / Roboto Condensed — tipografía 02 (Google Fonts, idéntica).
         · Archivo — sustituto libre de Trade Gothic LT Std Bold Extended (tipo. 01).
         · Space Grotesk — sustituto libre de PP Neue Montreal (tipo. 03). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Roboto+Condensed:wght@300;400;500;700&family=Roboto:wght@300;400;500;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Preamble React Fast Refresh — workaround para @vitejs/plugin-react v6.
         En dev el plugin debería inyectarlo automáticamente pero a veces no sucede,
         causando "$RefreshSig$ is not defined". Este script se ignora en prod. -->
    <script type="module">
      import RefreshRuntime from "/@react-refresh"
      RefreshRuntime.injectIntoGlobalHook(window)
      window.$RefreshReg$ = () => {}
      window.$RefreshSig$ = () => (type) => type
      window.__vite_plugin_react_preamble_installed__ = true
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
